/* =========================================================================
   L2. Lane-Karte (Lanes & Fragmentierung) — verlinkte Hervorhebung
   ========================================================================= */
let _laneMap = null, _laneMapObs = null, _laneMapPopup = null, _laneMapFC = null;
let _laneViewRedraw = null;   // set by the lanes dashboard; redraws its charts in place

function teardownLaneMap(){
  if(_laneMapPopup){ try{ _laneMapPopup.remove(); }catch(e){} _laneMapPopup = null; }
  if(_laneMap){ try{ _laneMap.remove(); }catch(e){} _laneMap = null; }
  if(_laneMapObs){ try{ _laneMapObs.disconnect(); }catch(e){} _laneMapObs = null; }
  _laneMapFC = null;
}

/* route_id -> geometry lookup over the loaded GeoJSON */
function laneGeomIndex(){
  const idx = new Map();
  if(!State.geojson) return idx;
  for(const f of State.geojson.features){
    const fid = String((f.properties && f.properties.route_id) || f.id || "").trim();
    if(fid && !idx.has(fid)) idx.set(fid, f.geometry);
  }
  return idx;
}

/* One feature per lane: representative route geometry + aggregated stats.
   Colour: pink = savings potential computed, blue = fragmented, grey = single
   carrier. Width scales with Σ cost. */
function buildLaneFeatures(rows, savByLane){
  if(!State.geojson || !hasRole("shipment_id")) return {type:"FeatureCollection", features:[]};
  const geoms = laneGeomIndex();
  const groups = d3.rollups(rows, vs=>vs, r=>laneKey(r));
  const feats = [];
  for(const [lane, vs] of groups){
    if(!lane || lane.indexOf("?")>=0) continue;
    let geom = null;
    for(const r of vs){
      const id = String(val(r,"shipment_id") || "").trim();
      if(id && geoms.has(id)){ geom = geoms.get(id); break; }
    }
    if(!geom) continue;
    const sav = savByLane ? savByLane.get(lane) : null;
    feats.push({
      type:"Feature", geometry:geom,
      properties:{
        lane,
        tours: vs.length,
        carriers: new Set(vs.map(r=>carrierKey(r)).filter(k=>k!=="(unbekannt)")).size,
        price: d3.sum(vs, price),
        weight: d3.sum(vs, weight),
        savingsLower: sav ? sav.savingsLower : null,
        savingsUpper: sav ? sav.savingsUpper : null,
      }
    });
  }
  const maxP = d3.max(feats, f=>f.properties.price) || 1;
  const wSc  = d3.scaleSqrt().domain([0, maxP]).range([1.5, 7]);
  const cSav  = cssVar("--kpmg-pink")       || "#C6007E";
  const cFrag = cssVar("--kpmg-light-blue") || "#0091DA";
  const cMono = cssVar("--text-faint")      || "#8DA0BC";
  for(const f of feats){
    const p = f.properties;
    p._width = +wSc(p.price || 0).toFixed(2);
    p._color = p.savingsUpper != null ? cSav : (p.carriers > 1 ? cFrag : cMono);
  }
  return {type:"FeatureCollection", features:feats};
}

function mountLaneMap(host, fc){
  teardownLaneMap();
  if(!fc.features.length){ noData(host, "Keine Routen-Features matchen die aktuelle Auswahl."); return; }
  host.innerHTML = "";
  const map = new maplibregl.Map({
    container: host,
    style: currentBasemapUrl(),
    center: [9.5, 51.5], zoom: 5.4, attributionControl: true,
    cooperativeGestures: false,
  });
  _laneMap = map; _laneMapFC = fc;
  map.addControl(new maplibregl.NavigationControl({showCompass:false}), "top-right");
  map.addControl(new maplibregl.ScaleControl({maxWidth:120, unit:"metric"}), "bottom-left");
  let bound = false;
  const draw = ()=>{
    renderLaneMapLayer(map, fc);
    if(!bound){ bindLaneMapEvents(map); bound = true; }
  };
  map.on("load", draw);
  map.on("style.load", draw);
  _laneMapObs = new ResizeObserver(()=>{ try{ map.resize(); }catch(e){} });
  _laneMapObs.observe(host);
  fitMapTo(map, fc);
}

function renderLaneMapLayer(map, fc){
  if(map.getLayer("lanes-hit")) map.removeLayer("lanes-hit");
  if(map.getLayer("lanes-lines")) map.removeLayer("lanes-lines");
  if(map.getSource("lanes")) map.removeSource("lanes");
  map.addSource("lanes", {type:"geojson", data: fc});
  map.addLayer({
    id:"lanes-lines", type:"line", source:"lanes",
    paint:{
      "line-color": ["coalesce", ["get","_color"], "#888"],
      "line-width": ["coalesce", ["get","_width"], 2],
      "line-opacity": 0.85,
    },
    layout:{ "line-cap":"round", "line-join":"round" }
  });
  map.addLayer({
    id:"lanes-hit", type:"line", source:"lanes",
    paint:{ "line-color":"#000", "line-opacity":0, "line-width":["max", 14, ["+", 6, ["coalesce", ["get","_width"], 2]]] },
  });
  updateLaneMapHighlight();
}

function bindLaneMapEvents(map){
  map.on("click", "lanes-hit", (e)=>{
    const f = e.features && e.features[0]; if(!f) return;
    const p = f.properties;
    if(_laneMapPopup) try{ _laneMapPopup.remove(); }catch(_){}
    _laneMapPopup = new maplibregl.Popup({offset:8, closeButton:true})
      .setLngLat(e.lngLat)
      .setHTML(
        `<div style="font-weight:700;margin-bottom:4px">${escHtml(p.lane)}</div>` +
        `<div>${fmtNumber(+p.tours||0)} Touren · ${fmtNumber(+p.carriers||0)} Frachtführer</div>` +
        `<div>Σ Kosten: <b>${fmtCurrency(+p.price||0)}</b> · Σ Gewicht: <b>${fmtWeight(+p.weight||0)}</b></div>` +
        (p.savingsUpper!=null ? `<div>Einsparpotenzial: <b>${fmtCurrency(+p.savingsLower||0)} – ${fmtCurrency(+p.savingsUpper||0)}</b></div>` : "") +
        `<div class="tip-hint">Klick schaltet die Hervorhebung um</div>`
      )
      .addTo(map);
    selectLane(p.lane, {fromMap:true});
  });
  map.on("mouseenter", "lanes-hit", ()=>{ map.getCanvas().style.cursor = "pointer"; });
  map.on("mouseleave", "lanes-hit", ()=>{ map.getCanvas().style.cursor = ""; });
}

function updateLaneMapHighlight(){
  if(!_laneMap) return;
  try{
    if(!_laneMap.getLayer("lanes-lines")) return;
    const sel = State.selLane;
    const baseW = ["coalesce", ["get","_width"], 2];
    if(sel == null){
      _laneMap.setPaintProperty("lanes-lines", "line-opacity", 0.85);
      _laneMap.setPaintProperty("lanes-lines", "line-width", baseW);
    } else {
      _laneMap.setPaintProperty("lanes-lines", "line-opacity",
        ["case", ["==", ["get","lane"], sel], 1, 0.12]);
      _laneMap.setPaintProperty("lanes-lines", "line-width",
        ["case", ["==", ["get","lane"], sel], ["+", baseW, 2.5], baseW]);
    }
  }catch(e){}
}

function flyToLane(lane){
  if(!_laneMap || !_laneMapFC) return;
  const f = _laneMapFC.features.find(x=>x.properties.lane===lane);
  if(f) fitMapTo(_laneMap, {features:[f]});
}

/* Toggle the highlighted lane and sync map + charts + table. */
function selectLane(lane, opts){
  opts = opts || {};
  State.selLane = (State.selLane === lane) ? null : lane;
  if(typeof _laneViewRedraw === "function") _laneViewRedraw();
  updateLaneMapHighlight();
  if(State.selLane != null && !opts.fromMap) flyToLane(State.selLane);
}

    const rows = base.filter(r => carrierKey(r) === sel);
    const sumP = d3.sum(rows, price), sumW = d3.sum(rows, weight), sumK = d3.sum(rows, tourKm);

/* =========================================================================
   N. Stacked-bar helper used by ownership / temperature dashboards
   ========================================================================= */
function renderCrossBar(host, rows, groupRole, splitRole, colorFor, opts){
  opts = opts || {};
  if(!hasRole(groupRole) || !hasRole(splitRole)){ noData(host, opts.empty); return; }
  const groups = d3.rollups(rows, vs=>vs, r=> val(r,groupRole)||"(leer)");
  const items = groups.map(([key,vs])=>({key, total: d3.sum(vs, price), rows:vs}))
    .filter(d=>d.key!=="(leer)")
    .sort((a,b)=>b.total-a.total);
  const data = opts.topN ? items.slice(0, opts.topN) : items.slice(0, 15);
  if(!data.length){ noData(host, opts.empty); return; }
  // build series per split value
  const splitsSet = new Set();
  for(const it of data){
    const sub = d3.rollups(it.rows, vs=>d3.sum(vs, price), r=> val(r,splitRole)||"(leer)");
    it.split = new Map(sub); for(const [k] of sub) splitsSet.add(k);
  }
  const splits = Array.from(splitsSet).filter(s=>s!=="(leer)");
  // layout
  const h = Math.max(170, data.length*26 + 38);
  const {g,innerW,innerH} = makeSvg(host, h, {top:8,right:26,bottom:30,left:opts.left||190});
  const x = d3.scaleLinear().domain([0, d3.max(data, d=>d.total) || 1]).nice().range([0, innerW]);
  const y = d3.scaleBand().domain(data.map(d=>d.key)).range([0, innerH]).padding(.22);
  g.append("g").attr("class","gridline").call(d3.axisBottom(x).ticks(5).tickSize(innerH).tickFormat(""));
  const row = g.selectAll(".row").data(data).join("g").attr("class","row")
    .attr("transform", d=>`translate(0,${y(d.key)})`);
  row.each(function(d){
    let cum = 0;
    const sel = d3.select(this);
    splits.forEach(s=>{
      const v = d.split.get(s) || 0; if(!v) return;
      const w = x(v);
      sel.append("rect").attr("x", x(cum)).attr("y", 0).attr("height", y.bandwidth()).attr("width", w).attr("rx", 3)
        .attr("fill", colorFor(s))
        .on("mousemove", (e)=> showTip(`<b>${escHtml(d.key)}</b><br>${escHtml(s)}: ${fmtCurrency(v)} · ${fmtPct(d.total?v/d.total:0)}<br><span class="tip-hint">Klick zum Filtern (${splitRole})</span>`, e))
        .on("mouseleave", hideTip)
        .style("cursor","pointer")
        .on("click", ()=>{ if(clickGuard(s)) applyFilter(splitRole, s); });
      cum += v;
    });
  });
  const ya = g.append("g").attr("class","axis").call(d3.axisLeft(y).tickSize(0));
  ya.select(".domain").remove();
  ya.selectAll("text").each(function(){
    const t=d3.select(this); const s=t.text(); if(s.length>28){ t.text(s.slice(0,27)+"…"); t.append("title").text(s); }
  });
  g.append("g").attr("class","axis").attr("transform",`translate(0,${innerH})`).call(d3.axisBottom(x).ticks(5).tickFormat(fmtAbbrev));
  legend(host, splits.map(s=>({label:s, color:colorFor(s)})));
}

];

  {h:"VK", n:"Verkauf Lebensmittel"},
  {h:"DC", n:"Distributionszentrum"},
  {h:"FZ", n:"Frischezentrum"},
  {h:"TK", n:"Tiefkühl-Logistik"},

];

const SAMPLE_AUFART  = ["Normal","Express","Sonderfahrt","Retoure","Leerfahrt"];
const SAMPLE_KINDS   = ["Stückgut","Container","Wechselbrücke","Komplettladung","Teilladung"];
const SAMPLE_TEMPS   = ["Frisch","Gefroren","Trocken"];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function pickWeighted(a, p){ return a[Math.floor(Math.pow(Math.random(),p||1.6)*a.length)]; }
function rnd(a,b){ return a + Math.random()*(b-a); }

/* synthesise a LineString roughly between two points with mild zig-zag noise */
function syntheticPolyline(start, end, steps){
  steps = steps || 25;
  const out = [];
  for(let i=0;i<=steps;i++){
    const t = i/steps;
    const x = start.lon + (end.lon-start.lon)*t + (Math.sin(t*Math.PI*3)*0.05);
    const y = start.lat + (end.lat-start.lat)*t + (Math.cos(t*Math.PI*3)*0.04);
    out.push([+x.toFixed(5), +y.toFixed(5)]);
  }
  return out;
}
function haversineKm(a, b){
  const R=6371, toRad=v=>v*Math.PI/180;
  const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function generateSample(){
  // Build ~24 unique lanes; reuse routes across many shipments.
  const lanes = [];
  const seen = new Set();
  while(lanes.length<24){
    const a = pick(SAMPLE_LOCATIONS), b = pick(SAMPLE_LOCATIONS);
    if(a.key===b.key) continue;
    const k = a.key+"→"+b.key;
    if(seen.has(k)) continue; seen.add(k);
    lanes.push({start:a, end:b, line: syntheticPolyline(a,b), km: Math.round(haversineKm(a,b)*1.25)});
  }
  // Assign 1-3 "preferred carriers" per lane (some lanes intentionally fragmented).
  lanes.forEach((L,i)=>{
    const k = (i%5===0) ? 4 : (i%3===0 ? 3 : (i%2===0 ? 2 : 1));
    L.carriers = []; const used=new Set();
    while(L.carriers.length<k){
      const c = pick(SAMPLE_CARRIERS); if(used.has(c)) continue; used.add(c); L.carriers.push(c);
    }
  });
  // generate shipment rows
  const rows = [];
  const features = [];
  let nextId = 15850000;
  lanes.forEach((L,laneIdx)=>{
    const nTours = 8 + Math.floor(Math.random()*30); // 8–37 tours per lane
    // route geojson feature (one per lane, shared by all tours on the lane)
    // For visualisation we need EACH Tournummer to map to a feature, so we
    // create one feature per Tournummer reusing the same geometry — that's
    // the same join model as the production ors-routing output.
    for(let i=0;i<nTours;i++){
      const id = String(nextId++);
      const carrier = pickWeighted(L.carriers, 1.0);
      const own = /eigen/i.test(carrier) ? "Eigenlogistik" : "Fremdlogistik";
      const area = pick(SAMPLE_AREAS);
      const temp = pickWeighted(SAMPLE_TEMPS, 1.3);
      // price model: per-km + per-kg + carrier bias + temperature surcharge
      const w = Math.round(rnd(150, 18000));
      const tempMult = temp==="Gefroren" ? 1.35 : (temp==="Frisch" ? 1.15 : 1.0);
      const carrierMult = 0.9 + (SAMPLE_CARRIERS.indexOf(carrier)%6)*0.05;
      const basePerKm = own==="Eigenlogistik" ? 0.85 : 1.05;
      const baseFee   = own==="Eigenlogistik" ? 35 : 55;
      const px = Math.round((baseFee + basePerKm*L.km + w*0.011) * tempMult * carrierMult * 100) / 100;
      // date over last 90 days
      const day = new Date(); day.setDate(day.getDate() - Math.floor(Math.random()*90));
      rows.push({
        "Tournummer": id,
        "TourDatum": day,
        "Tourstatus": "abgerechnet",
        "Re": 1, "TS": 1,
        "Hauptbereich": area.h,
        "Bereich Name": area.n,
        "Bereichsart": "Standard",
        "Verkehrsart": "VA"+(SAMPLE_TRAFFIC.indexOf(pick(SAMPLE_TRAFFIC))+1),
        "Verkehrsart Name": pick(SAMPLE_TRAFFIC),
        "AufArt": pickWeighted(SAMPLE_AUFART, 2.2),
        "Temperaturbereich": temp,
        "Stückgut / Container Sped.": pick(SAMPLE_KINDS),
        "Frachtführer": "F"+String(100+SAMPLE_CARRIERS.indexOf(carrier)),
        "Frachtführername": carrier,
        "Eigen- vs. Fremdlogistik": own,
        "TourKM": L.km,
        "tats. Gewicht": w,
        "#Sp": Math.ceil(w/700),
        "Preis": px,
        "Absender": "A"+(laneIdx+1),
        "Absendername": L.start.key+" Standort",
        "A-PLZ": L.start.pc, "A-Ort": L.start.key, "A-LKZ": L.start.country,
        "Empfänger": "E"+(laneIdx+1),
        "Empfängername": L.end.key+" Standort",
        "E-PLZ": L.end.pc, "E-Ort": L.end.key, "E-LKZ": L.end.country,
        "__source":"beispiel-touren.xlsx"
      });
      features.push({
        type:"Feature", id:id,
        geometry:{type:"LineString", coordinates: L.line},
        properties:{
          route_id: id, profile:"driving-hgv",
          start:[L.start.lon, L.start.lat], end:[L.end.lon, L.end.lat],
          distance_m: Math.round(L.km*1000), duration_s: Math.round(L.km*60),
        }
      });
    }
  });
  return {rows, geojson:{type:"FeatureCollection", features}};
}

function loadSample(){

  State.isSample = true; State.errors = [];

  navigate("overview");
}

function navigate(viewId){
  const d = dashboards.find(x=>x.id===viewId);
  if(!d){ renderEmpty(); return; }
  if(!dashboardReady(d)){
    const f = dashboards.find(dashboardReady);
    if(f) navigate(f.id); else renderEmpty();
    return;
  }
  State.activeView = viewId;
  location.hash = "#/" + viewId;
  // tear down the map if leaving the map view
  if(viewId!=="map" && _map){ try{ _map.remove(); }catch(e){} _map=null; }
  // tear down the lane mini-map if leaving the lanes view
  if(viewId!=="lanes"){ teardownLaneMap(); _laneViewRedraw = null; }
  refreshShell();
  renderView();
}

  if((!State.rows.length && !State.geojson) || !State.activeView){ renderEmpty(); return; }

      </div>
      <div class="empty-actions">
        <button class="btn btn-primary" id="emBrowse">Dateien auswählen</button>
        <button class="btn" id="emSample">Beispieldaten laden</button>
      </div>
      <div class="note">CARTO-Basemap-Kacheln benötigen Internetzugang. CDN-Bibliotheken: D3 (ISC), SheetJS (Apache-2.0), MapLibre GL JS (BSD-3-Clause).</div>
      ${errs}
    </div>`;
  const dz = document.getElementById("dropzone");
  dz.onclick = ()=> document.getElementById("fileInput").click();
  document.getElementById("emBrowse").onclick = ()=> document.getElementById("fileInput").click();
  document.getElementById("emSample").onclick = loadSample;
}

/* =========================================================================
   Q. Init
   ========================================================================= */
function init(){
  // theme
  const t = loadTheme() || (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  setTheme(t);
  document.querySelectorAll("#themeToggle button").forEach(b=>{ b.onclick = ()=> setTheme(b.dataset.themeSet); });
  // mapping & map-view from storage (mapping applied after columns detected on load)
  State.mapping = loadMapping();
  State.mapView = loadMapView();
  // file input
  document.getElementById("fileInput").addEventListener("change", e=>{
    ingestFiles(e.target.files); e.target.value = "";
  });
  // global drag & drop
  ["dragenter","dragover"].forEach(ev => document.addEventListener(ev, e=>{
    e.preventDefault(); const dz = document.getElementById("dropzone"); if(dz) dz.classList.add("drag");
  }));
  ["dragleave","drop"].forEach(ev => document.addEventListener(ev, e=>{
    e.preventDefault(); const dz = document.getElementById("dropzone"); if(dz && ev!=="drop") dz.classList.remove("drag");
  }));
  document.addEventListener("drop", e=>{
    if(e.dataTransfer && e.dataTransfer.files.length) ingestFiles(e.dataTransfer.files);
  });
  // responsive re-render
  let rt; window.addEventListener("resize", ()=>{ clearTimeout(rt); rt = setTimeout(renderActiveDashboard, 180); });

  refreshShell();
  renderEmpty();
}
init();
</script>
</body>
</html>
